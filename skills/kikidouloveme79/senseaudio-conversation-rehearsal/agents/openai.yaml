interface:
  display_name: "Conversation Rehearsal"
  short_description: "Simulate high-pressure conversations with ASR, TTS, and debriefing"
  default_prompt: "Use $senseaudio-conversation-rehearsal to design and run a realistic rehearsal for this difficult conversation, then review what went wrong and how to improve it. When the user asks to直接听、每轮发语音、或在飞书里练, automatically send the generated counterpart turns one by one as Feishu audio messages instead of replying with file paths."
