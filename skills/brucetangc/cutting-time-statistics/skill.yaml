name: cutting-time-statistics
description: Cutting time statistics from laser cutting PDF files
author: OpenClaw
tags:
  - pdf
  - excel
  - laser-cutting
  - statistics

requirements:
  - openpyxl
  - pdfplumber
  - py7zr

commands:
  main:
    entry: calculator.py
    args:
      - zip_path
      - output_path

notes: |
  Requires Aiwei time template file to work.
  Template path: /home/admin/.openclaw/media/inbound/艾威时间模板.xlsx
  Output filename format: <original>_Cutting_time_statistics.xlsx
