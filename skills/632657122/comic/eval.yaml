version: "1"
defaults:
  trials: 3
  timeout: 300
  threshold: 0.8

trigger_tests:
  - id: explicit-comic
    should_trigger: true
    prompt: "Use the comic skill to create a multi-page knowledge comic."
  - id: implicit-comic
    should_trigger: true
    prompt: "Turn this tutorial into a short educational comic with multiple pages."
  - id: negative-control-infographic
    should_trigger: false
    prompt: "Create one dense infographic that explains this concept in a single image."

outcome_tests:
  - id: file-structure
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "package.json"
      - file_exists: "scripts/scaffold.ts"
      - file_exists: "scripts/build-prompts.ts"
      - file_exists: "scripts/build-batch.ts"
      - file_exists: "scripts/merge-to-pdf.ts"
